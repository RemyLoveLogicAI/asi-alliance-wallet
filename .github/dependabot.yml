# Dependabot Configuration for ASI Alliance Wallet
# PCI-DSS 6.2: Automated Security Patch Management
# Last Updated: February 11, 2026

version: 2

updates:
  # ===========================================
  # NPM (JavaScript/Node.js) Dependencies  
  # ===========================================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"  # Run at 3 AM UTC
      timezone: "UTC"
    
    # Only open PRs for security updates to avoid noise
    open-pull-requests-limit: 10
    
    # Group minor and patch updates
    groups:
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"
    
    # Automatic rebasing
    rebase-strategy: "auto"
    
    # Pull request labels
    labels:
      - "dependencies"
      - "security"
      - "automated"
    
    # Reviewers
    reviewers:
      - "RemyLoveLogicAI"
    
    # Assignees for security updates
    assignees:
      - "RemyLoveLogicAI"
    
    # Commit message prefix
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps)"
      include: "scope"
    
    # Version requirements
    versioning-strategy: "increase"
    
    # SUPPLY CHAIN ATTACK PROTECTION
    # Block suspicious version ranges based on supply chain attack investigation
    ignore:
      # CRITICAL: Block axios 1.13.x - 1.20.x due to supply chain attack
      # Investigation: PRs #55 and #56 attempted to install non-existent axios 1.13.5
      # Latest legitimate axios version: 1.7.9 (as of Feb 2026)
      # Block entire suspicious range to prevent future attack vectors
      - dependency-name: "axios"
        versions: ["1.13.x", "1.14.x", "1.15.x", "1.16.x", "1.17.x", "1.18.x", "1.19.x", "1.20.x"]
      
      # Block other suspicious high version numbers that don't exist
      - dependency-name: "axios"
        versions: [">= 2.0.0"]

  # ===========================================
  # NPM - Packages Directory
  # ===========================================
  - package-ecosystem: "npm"
    directory: "/packages/mobile"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile"
      - "security"
    commit-message:
      prefix: "fix(mobile)"

  - package-ecosystem: "npm"
    directory: "/packages/fetch-extension"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "extension"
      - "security"
    commit-message:
      prefix: "fix(extension)"

  - package-ecosystem: "npm"
    directory: "/packages/stores"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "stores"
      - "security"
    commit-message:
      prefix: "fix(stores)"

  # ===========================================
  # GitHub Actions
  # ===========================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    
    open-pull-requests-limit: 5
    
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    
    commit-message:
      prefix: "ci"
      include: "scope"
    
    # Pin actions to specific SHA for security
    # Dependabot will help keep these updated

  # ===========================================
  # Docker
  # ===========================================
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
      timezone: "UTC"
    
    open-pull-requests-limit: 3
    
    labels:
      - "dependencies"
      - "docker"
      - "security"
    
    commit-message:
      prefix: "build(docker)"
      include: "scope"

  # ===========================================
  # Python (for build scripts)
  # ===========================================
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:00"
      timezone: "UTC"
    
    open-pull-requests-limit: 3
    
    labels:
      - "dependencies"
      - "python"
      - "security"
    
    commit-message:
      prefix: "build(python)"
      include: "scope"

# ===========================================
# Registry Configuration (Global)
# ===========================================
# Only official npm registry is allowed
# Prevents supply chain attacks via unofficial registries
registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: false

# ===========================================
# Notes
# ===========================================
# 
# This Dependabot configuration implements PCI-DSS 6.2 requirements:
# - Automated security patch management
# - Daily checks for security updates
# - Immediate PR creation for vulnerabilities
# - Version verification against official registries
#
